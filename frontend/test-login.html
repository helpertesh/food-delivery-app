<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .test-section {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background: #e8f5e8;
            color: #2e7d32;
        }
        .error {
            background: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <h1>Login Diagnostic Tool</h1>
    
    <div class="test-section">
        <h3>Step 1: Test Server Connection</h3>
        <button onclick="testServer()">Test /api/test</button>
        <div id="serverResult" class="result"></div>
    </div>

    <div class="test-section">
        <h3>Step 2: Test Login Endpoint</h3>
        <input type="email" id="testEmail" placeholder="Email" value="admin@fooddelivery.com" style="width: 200px; padding: 5px; margin: 5px;">
        <input type="password" id="testPassword" placeholder="Password" value="admin123" style="width: 200px; padding: 5px; margin: 5px;">
        <button onclick="testLogin()">Test Login</button>
        <div id="loginResult" class="result"></div>
    </div>

    <div class="test-section">
        <h3>Step 3: Check Users in Database</h3>
        <button onclick="checkUsers()">Get All Users</button>
        <div id="usersResult" class="result"></div>
    </div>

    <script>
        const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:3000' : window.location.origin;
        async function testServer() {
            const div = document.getElementById('serverResult');
            div.innerHTML = 'Testing...';
            try {
                const res = await fetch(`${API_BASE}/api/test`);
                const data = await res.json();
                div.className = 'result success';
                div.innerHTML = '✅ Server is running!<br>' + JSON.stringify(data, null, 2);
            } catch (e) {
                div.className = 'result error';
                div.innerHTML = '❌ Server error: ' + e.message;
            }
        }

        async function testLogin() {
            const div = document.getElementById('loginResult');
            const email = document.getElementById('testEmail').value;
            const password = document.getElementById('testPassword').value;
            
            div.innerHTML = 'Testing login...';
            
            try {
                const res = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    div.className = 'result success';
                    div.innerHTML = '✅ Login successful!<br>' + JSON.stringify(data, null, 2);
                } else {
                    div.className = 'result error';
                    div.innerHTML = '❌ Login failed: ' + data.message;
                }
            } catch (e) {
                div.className = 'result error';
                div.innerHTML = '❌ Error: ' + e.message;
            }
        }

        async function checkUsers() {
            const div = document.getElementById('usersResult');
            div.innerHTML = 'Fetching users...';
            try {
                const res = await fetch(`${API_BASE}/api/users`);
                const data = await res.json();
                
                if (data.success) {
                    div.className = 'result success';
                    div.innerHTML = `✅ Found ${data.users.length} users:<br><pre>${JSON.stringify(data.users, null, 2)}</pre>`;
                } else {
                    div.className = 'result error';
                    div.innerHTML = '❌ ' + data.message;
                }
            } catch (e) {
                div.className = 'result error';
                div.innerHTML = '❌ Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
